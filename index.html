<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Web Nghe Nhạc BeeStation</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
        .player-container { background: #1e1e1e; padding: 30px; border-radius: 15px; display: inline-block; }
        audio { margin-top: 20px; width: 100%; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; background: #282828; margin: 5px 0; cursor: pointer; border-radius: 5px; }
        li:hover { background: #1db954; }
    </style>
</head>
<body>

<div class="player-container">
    <h2>Trang Web Nghe Nhạc Orange Bee</h2>
    <ul id="playlist">
        <!-- Thay link public của bạn vào phần data-src -->
        <li data-src="https://drive.google.com/drive/folders/1GmOA8H_VVWm3pNSN9PDGR3vQzPFo8MBG">Hạt Mưa Vương Vấn</li>
        <li data-src="https://drive.google.com/uc?export=download&id=1YYsfAPBsiMuyrOjQUGDFq4g-31V5XNbP">Tình Đơn Phương</li>
        <li data-src="https://drive.google.com/uc?export=download&id=1AGvKsczsxm1AQRDT6xLfCtBOeOZ4bewh">Anh Đau Từ Lúc Em Đi</li>
    </ul>
    <audio id="audio-player" controls></audio>
</div>

<script>
    const player = document.getElementById('audio-player');
    const songs = document.querySelectorAll('#playlist li');

    songs.forEach(song => {
        song.addEventListener('click', function() {
            player.src = this.getAttribute('data-src');
            player.play();
        });
    });
</script>
</body>
</html>
