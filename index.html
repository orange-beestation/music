<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Nghe Nhạc Orange Bee</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; padding: 40px 20px; }
        .player-container { background: #1e1e1e; padding: 30px; border-radius: 20px; display: inline-block; width: 100%; max-width: 400px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; color: #ff6b35; }
        ul { list-style: none; padding: 0; margin: 0 0 25px 0; }
        li { padding: 15px; background: #282828; margin: 8px 0; cursor: pointer; border-radius: 8px; transition: all 0.2s ease; font-weight: 500; border: 1px solid #333; }
        li:hover { background: #383838; border-color: #ff6b35; }
        li.active { background: #ff6b35; color: black; font-weight: bold; border-color: #ff6b35; }
        audio { width: 100%; margin-top: 10px; border-radius: 30px; }
    </style>
</head>
<body>

<div class="player-container">
    <h2>Trang Web Nghe Nhạc Orange Bee</h2>
    <ul id="playlist">
        <li class="active" data-id="11Izhly2b3QBSXE8ydb2tLDMPGqidcC_L">Hạt Mưa Vương Vấn</li>
        <li data-id="MÃ_ID_BÀI_TÌNH_ĐƠN_PHƯƠNG_THẬT">Tình Đơn Phương</li>
        <li data-id="MÃ_ID_BÀI_ANH_ĐAU_TỪ_LÚC_EM_ĐI_THẬT">Anh Đau Từ Lúc Em Đi</li>
    </ul>
    <audio id="audio-player" controls preload="metadata"></audio>
</div>

<script>
    const player = document.getElementById('audio-player');
    const songs = document.querySelectorAll('#playlist li');

    // Cấu trúc link stream vượt tường lửa Google Drive tốt nhất cho web
    function getStreamUrl(id) {
        return `https://lh3.googleusercontent.com/d/${id}`;
    }

    // Tự động nạp bài đầu tiên
    const firstSong = document.querySelector('#playlist li.active');
    if (firstSong) {
        const firstId = firstSong.getAttribute('data-id');
        if(firstId && !firstId.includes("MÃ_ID")) {
            player.src = getStreamUrl(firstId);
        }
    }

    // Xử lý click chọn bài
    songs.forEach(song => {
        song.addEventListener('click', function() {
            const songId = this.getAttribute('data-id');
            
            // Nếu chưa thay ID thật thì không chạy
            if (!songId || songId.includes("MÃ_ID")) {
                alert("Bạn chưa cấu hình mã ID Google Drive thật cho bài hát này!");
                return;
            }

            songs.forEach(s => s.classList.remove('active'));
            this.classList.add('active');
            
            player.src = getStreamUrl(songId);
            player.play().catch(error => console.log("Yêu cầu tương tác: ", error));
        });
    });
</script>
</body>
</html>
